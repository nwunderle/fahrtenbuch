<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Fahrtenbuch">
<meta name="theme-color" content="#0a0f1a">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
<title>Fahrtenbuch</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0f1a;
    --surface: #131927;
    --surface2: #1a2236;
    --border: #243049;
    --text: #e4e8f1;
    --text-dim: #7a8599;
    --accent: #3b82f6;
    --accent-glow: rgba(59,130,246,0.15);
    --green: #22c55e;
    --amber: #f59e0b;
    --red: #ef4444;
    --radius: 14px;
    --safe-top: env(safe-area-inset-top, 20px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'Plus Jakarta Sans', -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100dvh;
    padding-top: var(--safe-top);
    padding-bottom: calc(80px + var(--safe-bottom));
    overflow-x: hidden;
  }

  /* ── HEADER ── */
  .header {
    padding: 16px 20px 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .header h1 {
    font-size: 26px;
    font-weight: 700;
    letter-spacing: -0.5px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .header h1 .icon {
    width: 32px; height: 32px;
    background: var(--accent);
    border-radius: 9px;
    display: grid; place-items: center;
    font-size: 16px;
  }
  .header-actions { display: flex; gap: 8px; }
  .header-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text-dim);
    border-radius: 10px;
    padding: 8px 12px;
    font-size: 13px;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.2s;
  }
  .header-btn:active { background: var(--surface2); color: var(--text); }

  /* ── STATS BAR ── */
  .stats {
    display: flex;
    gap: 10px;
    padding: 0 20px 16px;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .stats::-webkit-scrollbar { display: none; }
  .stat-card {
    flex: 1;
    min-width: 100px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px;
  }
  .stat-card .label {
    font-size: 11px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    font-family: 'DM Mono', monospace;
  }
  .stat-card .value {
    font-size: 22px;
    font-weight: 700;
    margin-top: 2px;
    font-variant-numeric: tabular-nums;
  }
  .stat-card .value .unit {
    font-size: 13px;
    font-weight: 500;
    color: var(--text-dim);
  }

  /* ── TAB NAV (bottom) ── */
  .tab-bar {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: rgba(10,15,26,0.92);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-top: 1px solid var(--border);
    display: flex;
    padding-bottom: var(--safe-bottom);
    z-index: 100;
  }
  .tab {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    padding: 10px 0 8px;
    font-size: 10px;
    font-weight: 600;
    color: var(--text-dim);
    background: none; border: none;
    cursor: pointer;
    font-family: inherit;
    transition: color 0.2s;
  }
  .tab.active { color: var(--accent); }
  .tab svg { width: 24px; height: 24px; }

  /* ── PAGES ── */
  .page { display: none; padding: 0 20px 20px; }
  .page.active { display: block; animation: fadeIn 0.25s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }

  /* ── TRIP LIST ── */
  .trip-list { display: flex; flex-direction: column; gap: 10px; }
  .trip-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    position: relative;
    transition: all 0.2s;
  }
  .trip-card:active { background: var(--surface2); }
  .trip-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 10px;
  }
  .trip-date {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--text-dim);
  }
  .trip-km {
    font-family: 'DM Mono', monospace;
    font-size: 14px;
    font-weight: 500;
    color: var(--green);
    background: rgba(34,197,94,0.1);
    padding: 3px 8px;
    border-radius: 6px;
  }
  .trip-route {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 8px;
  }
  .route-dots {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
  }
  .route-dots .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    border: 2px solid var(--accent);
    background: transparent;
  }
  .route-dots .dot.end { background: var(--accent); }
  .route-dots .line {
    width: 2px; height: 16px;
    background: var(--border);
  }
  .route-texts { flex: 1; }
  .route-texts .from, .route-texts .to {
    font-size: 15px;
    font-weight: 500;
    line-height: 1.6;
  }
  .trip-vehicle {
    font-size: 12px;
    color: var(--text-dim);
    font-family: 'DM Mono', monospace;
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .trip-actions {
    display: flex;
    gap: 6px;
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px solid var(--border);
  }
  .trip-action-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text-dim);
    font-size: 12px;
    font-family: inherit;
    padding: 6px 12px;
    border-radius: 8px;
    cursor: pointer;
  }
  .trip-action-btn.delete { color: var(--red); }
  .trip-action-btn:active { opacity: 0.7; }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-dim);
  }
  .empty-state .big-icon { font-size: 48px; margin-bottom: 12px; }
  .empty-state p { font-size: 14px; line-height: 1.6; }

  /* ── FORM ── */
  .form-section {
    margin-bottom: 20px;
  }
  .form-section-title {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-dim);
    font-family: 'DM Mono', monospace;
    margin-bottom: 10px;
    padding-left: 2px;
  }
  .form-group {
    margin-bottom: 12px;
  }
  .form-group label {
    display: block;
    font-size: 13px;
    font-weight: 500;
    color: var(--text-dim);
    margin-bottom: 6px;
  }
  .form-group input, .form-group select {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-size: 16px;
    font-family: inherit;
    padding: 12px 14px;
    border-radius: 10px;
    outline: none;
    transition: border-color 0.2s;
    -webkit-appearance: none;
  }
  .form-group input:focus, .form-group select:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-glow);
  }
  .form-group input::placeholder { color: var(--text-dim); opacity: 0.5; }
  .form-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .km-calc {
    text-align: center;
    font-family: 'DM Mono', monospace;
    font-size: 14px;
    color: var(--green);
    padding: 8px;
    background: rgba(34,197,94,0.08);
    border-radius: 8px;
    margin-top: 8px;
    min-height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .route-estimate {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 12px;
    background: var(--accent-glow);
    border: 1px solid rgba(59,130,246,0.2);
    border-radius: 10px;
    margin-top: 8px;
    font-size: 13px;
    color: var(--accent);
    font-family: 'DM Mono', monospace;
    min-height: 42px;
    transition: all 0.3s;
    cursor: pointer;
  }
  .route-estimate:active { opacity: 0.7; }
  .route-estimate .est-icon { font-size: 16px; flex-shrink: 0; }
  .route-estimate .est-text { flex: 1; }
  .route-estimate.loading { color: var(--text-dim); }
  .route-estimate.error { color: var(--amber); border-color: rgba(245,158,11,0.2); background: rgba(245,158,11,0.08); }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }
  .spinner {
    width: 16px; height: 16px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    flex-shrink: 0;
  }

  .btn-primary {
    width: 100%;
    background: var(--accent);
    color: #fff;
    border: none;
    padding: 16px;
    border-radius: 12px;
    font-size: 16px;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-primary:active { transform: scale(0.98); opacity: 0.9; }
  .btn-primary:disabled { opacity: 0.4; }

  /* ── VEHICLES PAGE ── */
  .vehicle-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
  }
  .vehicle-info .vehicle-name { font-weight: 600; font-size: 15px; }
  .vehicle-info .vehicle-plate {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    color: var(--text-dim);
    margin-top: 2px;
  }
  .vehicle-delete {
    background: none; border: none;
    color: var(--red);
    font-size: 20px;
    cursor: pointer;
    padding: 4px 8px;
  }

  /* ── MONTH FILTER ── */
  .month-filter {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 0 20px 14px;
    justify-content: center;
  }
  .month-filter button {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    width: 36px; height: 36px;
    border-radius: 10px;
    font-size: 18px;
    cursor: pointer;
    display: grid; place-items: center;
  }
  .month-filter button:active { background: var(--surface2); }
  .month-filter .month-label {
    font-size: 15px;
    font-weight: 600;
    min-width: 140px;
    text-align: center;
  }

  /* ── TOAST ── */
  .toast {
    position: fixed;
    top: calc(var(--safe-top) + 12px);
    left: 20px; right: 20px;
    background: var(--green);
    color: #000;
    font-weight: 600;
    font-size: 14px;
    padding: 14px 16px;
    border-radius: 12px;
    text-align: center;
    z-index: 200;
    transform: translateY(-120%);
    transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1);
  }
  .toast.show { transform: translateY(0); }

  .section-title {
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 14px;
  }
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <h1><span class="icon">🚗</span> Fahrtenbuch</h1>
  <div class="header-actions">
    <button class="header-btn" onclick="exportCSV()">CSV ↓</button>
  </div>
</div>

<!-- Stats -->
<div class="stats" id="stats"></div>

<!-- Month Filter -->
<div class="month-filter">
  <button onclick="changeMonth(-1)">‹</button>
  <span class="month-label" id="monthLabel"></span>
  <button onclick="changeMonth(1)">›</button>
</div>

<!-- Page: Fahrten -->
<div class="page active" id="pageFahrten">
  <div class="trip-list" id="tripList"></div>
</div>

<!-- Page: Neue Fahrt -->
<div class="page" id="pageNeu">
  <div class="section-title" id="formTitle">Neue Fahrt</div>
  <div class="form-section">
    <div class="form-section-title">Wann & Wohin</div>
    <div class="form-row">
      <div class="form-group">
        <label>Datum</label>
        <input type="date" id="fDate">
      </div>
      <div class="form-group">
        <label>Uhrzeit</label>
        <input type="time" id="fTime">
      </div>
    </div>
    <div class="form-group">
      <label>Startort</label>
      <input type="text" id="fFrom" placeholder="z.B. Leipzig">
    </div>
    <div class="form-group">
      <label>Zielort</label>
      <input type="text" id="fTo" placeholder="z.B. Frankfurt">
    </div>
    <div class="route-estimate" id="routeEstimate" style="display:none">
      <span class="est-icon">📍</span>
      <span class="est-text" id="estText">Strecke berechnen…</span>
    </div>
  </div>

  <div class="form-section">
    <div class="form-section-title">Kilometerstand</div>
    <div class="form-row">
      <div class="form-group">
        <label>Start (km)</label>
        <input type="number" id="fKmStart" placeholder="automatisch" inputmode="decimal">
      </div>
      <div class="form-group">
        <label>Ende (km)</label>
        <input type="number" id="fKmEnd" placeholder="automatisch" inputmode="decimal">
      </div>
    </div>
    <div class="km-calc" id="kmCalc">—</div>
  </div>

  <div class="form-section">
    <div class="form-section-title">Fahrzeug</div>
    <div class="form-group">
      <select id="fVehicle">
        <option value="">Fahrzeug wählen…</option>
      </select>
    </div>
  </div>

  <button class="btn-primary" id="btnSave" onclick="saveTrip()">Fahrt speichern</button>
  <button class="btn-primary" id="btnCancel" onclick="cancelEdit()" style="display:none; background:transparent; border:1px solid var(--border); color:var(--text-dim); margin-top:10px;">Abbrechen</button>
</div>

<!-- Page: Fahrzeuge -->
<div class="page" id="pageFahrzeuge">
  <div class="section-title">Fahrzeuge</div>
  <div id="vehicleList"></div>
  <div class="form-section" style="margin-top:20px">
    <div class="form-section-title">Neues Fahrzeug</div>
    <div class="form-group">
      <label>Bezeichnung</label>
      <input type="text" id="vName" placeholder="z.B. VW Golf">
    </div>
    <div class="form-group">
      <label>Kennzeichen</label>
      <input type="text" id="vPlate" placeholder="z.B. L-AB 1234" style="text-transform:uppercase">
    </div>
    <button class="btn-primary" onclick="saveVehicle()" style="margin-top:8px">Fahrzeug hinzufügen</button>
  </div>
</div>

<!-- Tab Bar -->
<div class="tab-bar">
  <button class="tab active" data-page="pageFahrten" onclick="switchTab(this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
    Fahrten
  </button>
  <button class="tab" data-page="pageNeu" onclick="switchTab(this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
    Neue Fahrt
  </button>
  <button class="tab" data-page="pageFahrzeuge" onclick="switchTab(this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="1" y="3" width="15" height="13" rx="2"/><path d="M16 8h3l3 3v5h-6V8z"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>
    Fahrzeuge
  </button>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ── DATA ──
let editingId = null; // set when editing a trip
const TRIPS_KEY = 'fahrtenbuch_trips';
const VEHICLES_KEY = 'fahrtenbuch_vehicles';

function getTrips() {
  try { return JSON.parse(localStorage.getItem(TRIPS_KEY)) || []; }
  catch { return []; }
}
function saveTrips(t) { localStorage.setItem(TRIPS_KEY, JSON.stringify(t)); }

function getVehicles() {
  try { return JSON.parse(localStorage.getItem(VEHICLES_KEY)) || []; }
  catch { return []; }
}
function saveVehicles(v) { localStorage.setItem(VEHICLES_KEY, JSON.stringify(v)); }

// ── MONTH FILTER ──
let filterDate = new Date();

const monthNames = ['Januar','Februar','März','April','Mai','Juni','Juli','August','September','Oktober','November','Dezember'];

function changeMonth(dir) {
  filterDate.setMonth(filterDate.getMonth() + dir);
  render();
}

function getFilteredTrips() {
  const m = filterDate.getMonth();
  const y = filterDate.getFullYear();
  return getTrips().filter(t => {
    const d = new Date(t.date + 'T' + (t.time || '00:00'));
    return d.getMonth() === m && d.getFullYear() === y;
  });
}

// ── RENDER ──
function render() {
  renderMonthLabel();
  renderStats();
  renderTrips();
  renderVehicles();
  renderVehicleSelect();
}

function renderMonthLabel() {
  document.getElementById('monthLabel').textContent =
    monthNames[filterDate.getMonth()] + ' ' + filterDate.getFullYear();
}

function renderStats() {
  const trips = getFilteredTrips();
  const totalKm = trips.reduce((s, t) => s + (t.kmEnd - t.kmStart), 0);
  const count = trips.length;
  document.getElementById('stats').innerHTML = `
    <div class="stat-card">
      <div class="label">Fahrten</div>
      <div class="value">${count}</div>
    </div>
    <div class="stat-card">
      <div class="label">Gesamt</div>
      <div class="value">${totalKm.toLocaleString('de-DE')} <span class="unit">km</span></div>
    </div>
    <div class="stat-card">
      <div class="label">⌀ / Fahrt</div>
      <div class="value">${count ? Math.round(totalKm / count).toLocaleString('de-DE') : 0} <span class="unit">km</span></div>
    </div>
  `;
}

function renderTrips() {
  const trips = getFilteredTrips().sort((a, b) => {
    const da = new Date(a.date + 'T' + (a.time || '00:00'));
    const db = new Date(b.date + 'T' + (b.time || '00:00'));
    return db - da;
  });
  const el = document.getElementById('tripList');

  if (!trips.length) {
    el.innerHTML = `<div class="empty-state">
      <div class="big-icon">📋</div>
      <p>Keine Fahrten in diesem Monat.<br>Tippe auf <strong>Neue Fahrt</strong>, um loszulegen.</p>
    </div>`;
    return;
  }

  el.innerHTML = trips.map(t => {
    const dist = t.kmEnd - t.kmStart;
    const d = new Date(t.date + 'T' + (t.time || '00:00'));
    const dateStr = d.toLocaleDateString('de-DE', { weekday:'short', day:'2-digit', month:'2-digit', year:'numeric' });
    const timeStr = t.time || '';
    const vehicles = getVehicles();
    const v = vehicles.find(v => v.id === t.vehicleId);
    return `<div class="trip-card" onclick="toggleTripActions('${t.id}')">
      <div class="trip-top">
        <div class="trip-date">${dateStr}${timeStr ? ' · ' + timeStr : ''}</div>
        <div class="trip-km">${dist.toLocaleString('de-DE')} km</div>
      </div>
      <div class="trip-route">
        <div class="route-dots"><div class="dot"></div><div class="line"></div><div class="dot end"></div></div>
        <div class="route-texts">
          <div class="from">${esc(t.from)}</div>
          <div class="to">${esc(t.to)}</div>
        </div>
      </div>
      ${v ? `<div class="trip-vehicle">🚘 ${esc(v.name)} · ${esc(v.plate)}</div>` : ''}
      <div class="trip-vehicle" style="margin-top:4px">📍 ${t.kmStart.toLocaleString('de-DE')} → ${t.kmEnd.toLocaleString('de-DE')} km</div>
      <div class="trip-actions" id="actions-${t.id}" style="display:none">
        <button class="trip-action-btn" onclick="event.stopPropagation(); editTrip('${t.id}')">Bearbeiten</button>
        <button class="trip-action-btn delete" onclick="event.stopPropagation(); deleteTrip('${t.id}')">Löschen</button>
      </div>
    </div>`;
  }).join('');
}

function toggleTripActions(id) {
  const el = document.getElementById('actions-' + id);
  el.style.display = el.style.display === 'none' ? 'flex' : 'none';
}

function renderVehicles() {
  const vehicles = getVehicles();
  const el = document.getElementById('vehicleList');
  if (!vehicles.length) {
    el.innerHTML = '<div class="empty-state"><p>Noch keine Fahrzeuge angelegt.</p></div>';
    return;
  }
  el.innerHTML = vehicles.map(v => `
    <div class="vehicle-card">
      <div class="vehicle-info">
        <div class="vehicle-name">${esc(v.name)}</div>
        <div class="vehicle-plate">${esc(v.plate)}</div>
      </div>
      <button class="vehicle-delete" onclick="deleteVehicle('${v.id}')">×</button>
    </div>
  `).join('');
}

function renderVehicleSelect() {
  const vehicles = getVehicles();
  const sel = document.getElementById('fVehicle');
  sel.innerHTML = '<option value="">Fahrzeug wählen…</option>' +
    vehicles.map(v => `<option value="${v.id}">${esc(v.name)} (${esc(v.plate)})</option>`).join('');
}

// ── ACTIONS ──
function saveTrip() {
  const date = document.getElementById('fDate').value;
  const time = document.getElementById('fTime').value;
  const from = document.getElementById('fFrom').value.trim();
  const to = document.getElementById('fTo').value.trim();
  const kmStart = parseFloat(document.getElementById('fKmStart').value);
  const kmEnd = parseFloat(document.getElementById('fKmEnd').value);
  const vehicleId = document.getElementById('fVehicle').value;

  if (!date || !from || !to || isNaN(kmStart) || isNaN(kmEnd)) {
    showToast('Bitte alle Pflichtfelder ausfüllen.', true);
    return;
  }
  if (kmEnd <= kmStart) {
    showToast('Endkilometer muss größer als Startkilometer sein.', true);
    return;
  }

  const trips = getTrips();

  if (editingId) {
    const idx = trips.findIndex(t => t.id === editingId);
    if (idx !== -1) {
      trips[idx] = { ...trips[idx], date, time, from, to, kmStart, kmEnd, vehicleId };
    }
    saveTrips(trips);
    showToast('Fahrt aktualisiert ✓');
  } else {
    trips.push({ id: uid(), date, time, from, to, kmStart, kmEnd, vehicleId });
    saveTrips(trips);
    showToast('Fahrt gespeichert ✓');
  }

  resetForm();
  filterDate = new Date(date + 'T00:00');
  switchTab(document.querySelector('[data-page="pageFahrten"]'));
}

function editTrip(id) {
  const trip = getTrips().find(t => t.id === id);
  if (!trip) return;

  editingId = id;

  document.getElementById('fDate').value = trip.date;
  document.getElementById('fTime').value = trip.time || '';
  document.getElementById('fFrom').value = trip.from;
  document.getElementById('fTo').value = trip.to;
  document.getElementById('fKmStart').value = trip.kmStart;
  document.getElementById('fKmEnd').value = trip.kmEnd;
  document.getElementById('fVehicle').value = trip.vehicleId || '';
  calcKm();

  updateFormUI();
  switchTab(document.querySelector('[data-page="pageNeu"]'));
}

function cancelEdit() {
  editingId = null;
  resetForm();
  updateFormUI();
}

function resetForm() {
  const now = new Date();
  document.getElementById('fDate').value = now.toISOString().slice(0, 10);
  document.getElementById('fTime').value = now.toTimeString().slice(0, 5);
  document.getElementById('fFrom').value = '';
  document.getElementById('fTo').value = '';
  document.getElementById('fKmStart').value = '';
  document.getElementById('fKmEnd').value = '';
  document.getElementById('fVehicle').value = '';
  document.getElementById('kmCalc').textContent = '—';
  document.getElementById('routeEstimate').style.display = 'none';
  estimatedDistance = null;
  editingId = null;
}

function updateFormUI() {
  const title = document.getElementById('formTitle');
  const btn = document.getElementById('btnSave');
  const cancelBtn = document.getElementById('btnCancel');
  if (editingId) {
    title.textContent = 'Fahrt bearbeiten';
    btn.textContent = 'Änderungen speichern';
    cancelBtn.style.display = 'block';
  } else {
    title.textContent = 'Neue Fahrt';
    btn.textContent = 'Fahrt speichern';
    cancelBtn.style.display = 'none';
  }
}

function deleteTrip(id) {
  if (!confirm('Fahrt wirklich löschen?')) return;
  const trips = getTrips().filter(t => t.id !== id);
  saveTrips(trips);
  render();
  showToast('Fahrt gelöscht');
}

function saveVehicle() {
  const name = document.getElementById('vName').value.trim();
  const plate = document.getElementById('vPlate').value.trim().toUpperCase();
  if (!name || !plate) { showToast('Bitte Name und Kennzeichen angeben.', true); return; }

  const vehicles = getVehicles();
  vehicles.push({ id: uid(), name, plate });
  saveVehicles(vehicles);
  document.getElementById('vName').value = '';
  document.getElementById('vPlate').value = '';
  render();
  showToast('Fahrzeug hinzugefügt ✓');
}

function deleteVehicle(id) {
  if (!confirm('Fahrzeug wirklich löschen?')) return;
  saveVehicles(getVehicles().filter(v => v.id !== id));
  render();
}

// ── CSV EXPORT ──
function exportCSV() {
  const trips = getFilteredTrips().sort((a, b) => a.date.localeCompare(b.date));
  if (!trips.length) { showToast('Keine Fahrten zum Exportieren.', true); return; }

  const vehicles = getVehicles();
  const header = 'Datum;Uhrzeit;Von;Nach;KM Start;KM Ende;Distanz;Fahrzeug;Kennzeichen';
  const rows = trips.map(t => {
    const v = vehicles.find(v => v.id === t.vehicleId);
    return [
      t.date, t.time || '',
      `"${t.from}"`, `"${t.to}"`,
      t.kmStart, t.kmEnd, t.kmEnd - t.kmStart,
      v ? `"${v.name}"` : '', v ? `"${v.plate}"` : ''
    ].join(';');
  });

  const csv = '\uFEFF' + header + '\n' + rows.join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const label = monthNames[filterDate.getMonth()] + '_' + filterDate.getFullYear();
  a.href = url;
  a.download = `Fahrtenbuch_${label}.csv`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('CSV exportiert ✓');
}

// ── UI HELPERS ──
function switchTab(btn) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById(btn.dataset.page).classList.add('active');
  if (btn.dataset.page !== 'pageNeu' && editingId) {
    cancelEdit();
  }
  if (btn.dataset.page === 'pageNeu' && !editingId) {
    prefillKmStart();
  }
  render();
}

function showToast(msg, isError) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.background = isError ? 'var(--red)' : 'var(--green)';
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 7); }
function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

// ── KM CALC ──
document.getElementById('fKmStart').addEventListener('input', calcKm);
document.getElementById('fKmEnd').addEventListener('input', calcKm);
function calcKm() {
  const s = parseFloat(document.getElementById('fKmStart').value);
  const e = parseFloat(document.getElementById('fKmEnd').value);
  const el = document.getElementById('kmCalc');
  if (!isNaN(s) && !isNaN(e) && e > s) {
    el.textContent = '= ' + (e - s).toLocaleString('de-DE') + ' km';
  } else {
    el.textContent = '—';
  }
}

// ── ROUTE ESTIMATION (Nominatim + OSRM) ──
let estimatedDistance = null;
let estimateTimeout = null;

// Show estimate button when both fields have content
document.getElementById('fFrom').addEventListener('input', onLocationChange);
document.getElementById('fTo').addEventListener('input', onLocationChange);

function onLocationChange() {
  const from = document.getElementById('fFrom').value.trim();
  const to = document.getElementById('fTo').value.trim();
  const box = document.getElementById('routeEstimate');

  if (from.length >= 2 && to.length >= 2) {
    box.style.display = 'flex';
    box.className = 'route-estimate';
    document.getElementById('estText').textContent = 'Tippen → Strecke berechnen';
    // auto-trigger after 1.5s of no typing
    clearTimeout(estimateTimeout);
    estimateTimeout = setTimeout(() => estimateRoute(), 1500);
  } else {
    box.style.display = 'none';
    estimatedDistance = null;
  }
}

async function geocode(place) {
  const url = `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(place)}&format=json&limit=1&countrycodes=de,at,ch`;
  const res = await fetch(url, { headers: { 'Accept-Language': 'de' } });
  const data = await res.json();
  if (!data.length) throw new Error('Ort nicht gefunden: ' + place);
  return { lat: parseFloat(data[0].lat), lng: parseFloat(data[0].lon), name: data[0].display_name.split(',')[0] };
}

async function getRouteDistance(from, to) {
  const url = `https://router.project-osrm.org/route/v1/driving/${from.lng},${from.lat};${to.lng},${to.lat}?overview=false`;
  const res = await fetch(url);
  const data = await res.json();
  if (data.code !== 'Ok' || !data.routes.length) throw new Error('Route nicht berechenbar');
  return Math.round(data.routes[0].distance / 1000); // meters → km
}

async function estimateRoute() {
  clearTimeout(estimateTimeout);
  const fromVal = document.getElementById('fFrom').value.trim();
  const toVal = document.getElementById('fTo').value.trim();
  if (fromVal.length < 2 || toVal.length < 2) return;

  const box = document.getElementById('routeEstimate');
  const text = document.getElementById('estText');

  // Loading state
  box.className = 'route-estimate loading';
  box.style.display = 'flex';
  text.innerHTML = '<span class="spinner" style="display:inline-block;vertical-align:middle;margin-right:8px"></span> Berechne Strecke…';

  try {
    // small delay between geocoding requests (Nominatim policy: 1 req/s)
    const fromGeo = await geocode(fromVal);
    await new Promise(r => setTimeout(r, 1100));
    const toGeo = await geocode(toVal);

    const distKm = await getRouteDistance(fromGeo, toGeo);
    estimatedDistance = distKm;

    box.className = 'route-estimate';
    text.textContent = `≈ ${distKm.toLocaleString('de-DE')} km Strecke — tippen zum Übernehmen`;

    // Auto-fill if kmStart is set but kmEnd is empty
    autoFillKmEnd();

  } catch (err) {
    box.className = 'route-estimate error';
    text.textContent = '⚠ ' + err.message;
    estimatedDistance = null;
  }
}

// Click on estimate → apply to km fields or re-calculate
document.getElementById('routeEstimate').addEventListener('click', function(e) {
  const text = document.getElementById('estText').textContent;
  if (text.includes('Berechne')) return; // already loading
  if (estimatedDistance) {
    applyEstimate();
    showToast(`${estimatedDistance} km übernommen ✓`);
  } else {
    estimateRoute();
  }
});

function applyEstimate() {
  if (!estimatedDistance) return;
  const kmStartEl = document.getElementById('fKmStart');
  const kmEndEl = document.getElementById('fKmEnd');

  // If kmStart is empty, try to auto-fill from last trip
  if (!kmStartEl.value) {
    const lastKm = getLastKmEnd();
    if (lastKm !== null) {
      kmStartEl.value = lastKm;
    }
  }

  const startVal = parseFloat(kmStartEl.value);
  if (!isNaN(startVal)) {
    kmEndEl.value = Math.round(startVal + estimatedDistance);
    calcKm();
  }
}

function autoFillKmEnd() {
  const kmStartEl = document.getElementById('fKmStart');
  const kmEndEl = document.getElementById('fKmEnd');
  if (estimatedDistance && kmStartEl.value && !kmEndEl.value) {
    applyEstimate();
  }
}

// Auto-fill kmStart from last trip's kmEnd
function getLastKmEnd() {
  const trips = getTrips().sort((a, b) => {
    const da = new Date(a.date + 'T' + (a.time || '23:59'));
    const db = new Date(b.date + 'T' + (b.time || '23:59'));
    return db - da;
  });
  return trips.length ? trips[0].kmEnd : null;
}

function prefillKmStart() {
  if (editingId) return;
  const kmStartEl = document.getElementById('fKmStart');
  if (!kmStartEl.value) {
    const lastKm = getLastKmEnd();
    if (lastKm !== null) {
      kmStartEl.value = lastKm;
      calcKm();
    }
  }
}

// Also auto-fill kmEnd when user manually enters kmStart
document.getElementById('fKmStart').addEventListener('change', function() {
  autoFillKmEnd();
});

// ── INIT ──
(function init() {
  const now = new Date();
  document.getElementById('fDate').value = now.toISOString().slice(0, 10);
  document.getElementById('fTime').value = now.toTimeString().slice(0, 5);
  prefillKmStart();
  render();

  // Register Service Worker
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js').then(reg => {
      console.log('SW registered:', reg.scope);
    }).catch(err => {
      console.log('SW registration failed:', err);
    });
  }
})();
</script>
